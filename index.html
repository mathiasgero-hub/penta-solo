<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--mk:#111111;--mw:#F5F2E8;--mr:#D92B1A;--my:#F5C800;--mb:#1A3A8C;--ln:3px;--ls:2px}
html,body{height:100%;background:#e0ddd4}
body{display:flex;justify-content:center;align-items:flex-start;padding:10px 0;font-family:'Arial Black',Arial,sans-serif}
#app{background:var(--mw);width:100%;max-width:420px;border:var(--ln) solid var(--mk);overflow:hidden}
.acbar{display:grid;grid-template-columns:55px 1fr 38px;height:8px}
.acbar .r{background:var(--mr)}.acbar .w{background:var(--mw)}.acbar .b{background:var(--mb)}
.hd{background:var(--mk);padding:10px 14px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:var(--ln) solid var(--mk)}
.logo{font-size:20px;font-weight:900;color:var(--mw);letter-spacing:3px;line-height:1}
.logo .r{color:var(--mr)}.logo .y{color:var(--my)}.logo .b{color:var(--mb)}
.modetabs{display:flex;border-bottom:var(--ln) solid var(--mk)}
.mtab{flex:1;padding:9px 4px;font-size:10px;font-weight:900;letter-spacing:1px;text-transform:uppercase;background:var(--mw);color:#888;border:none;border-right:var(--ls) solid var(--mk);cursor:pointer;font-family:inherit}
.mtab:last-child{border-right:none}
.mtab.ar{background:var(--mr);color:var(--mw)}
.mtab.ab{background:var(--mb);color:var(--mw)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:var(--ln) solid var(--mk)}
.stat{padding:7px 4px;text-align:center;border-right:var(--ls) solid var(--mk)}
.stat:last-child{border-right:none}
.sv{font-size:17px;font-weight:900;color:var(--mk);line-height:1}
.sl{font-size:9px;font-weight:700;color:#666;letter-spacing:1px;text-transform:uppercase;margin-top:2px}

/* Barre de niveaux scrollable */
.lvlbar{display:flex;border-bottom:var(--ls) solid var(--mk);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.lvlbar::-webkit-scrollbar{display:none}
.lb{flex:0 0 auto;min-width:38px;padding:8px 6px;font-size:10px;font-weight:900;letter-spacing:1px;text-transform:uppercase;background:var(--mw);color:var(--mk);border:none;border-right:var(--ls) solid var(--mk);cursor:pointer;font-family:inherit;white-space:nowrap}
.lb:last-child{border-right:none}
.lb.cur-r{background:var(--mr);color:var(--mw);box-shadow:inset 0 0 0 3px var(--mk)}
.lb.cur-b{background:var(--mb);color:var(--mw);box-shadow:inset 0 0 0 3px var(--mk)}
.lb.cur-y{background:var(--my);color:var(--mk);box-shadow:inset 0 0 0 3px var(--mk)}
.lb.cur-k{background:var(--mk);color:var(--mw);box-shadow:inset 0 0 0 3px var(--mr)}
.mtab.ak{background:var(--mk);color:var(--my);font-weight:900}
.lb.cur-p{background:#7B3FA0;color:var(--mw);box-shadow:inset 0 0 0 3px var(--mk)}
.lb.cur-g{background:#0A7E5B;color:var(--mw);box-shadow:inset 0 0 0 3px var(--mk)}
.lb.cur-o{background:#C46A00;color:var(--mw);box-shadow:inset 0 0 0 3px var(--mk)}

/* Bandeau silhouette */
.sinfo{display:none;align-items:center;gap:10px;padding:7px 12px;border-bottom:var(--ls) solid var(--mk)}
.sbadge{width:30px;height:30px;border:var(--ls) solid var(--mk);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.sname{font-size:13px;font-weight:900;letter-spacing:1px;text-transform:uppercase;color:var(--mk)}
.shit{font-size:9px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px}

/* Numéro du défi */
.dnum{font-size:9px;font-weight:900;color:#888;letter-spacing:1px;text-transform:uppercase;margin-top:1px}

#msg{padding:7px 12px;font-size:10px;font-weight:900;letter-spacing:.8px;color:var(--mk);background:var(--mw);border-bottom:var(--ls) solid var(--mk);min-height:30px;text-transform:uppercase;display:flex;align-items:center}
#gwrap{display:flex;justify-content:center;padding:14px 10px;background:var(--mw);border-bottom:var(--ln) solid var(--mk)}
#grid{display:block;touch-action:none;cursor:pointer}
.trhd{display:flex;justify-content:space-between;align-items:center;padding:6px 10px 4px;border-bottom:var(--ls) solid var(--mk)}
.trlbl{font-size:9px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:#666}
#prow{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;padding:8px;border-bottom:var(--ln) solid var(--mk);min-height:56px;align-items:center}
.pc{cursor:grab;border:var(--ls) solid transparent;padding:3px;user-select:none;-webkit-user-select:none;touch-action:none}
.pc:active{cursor:grabbing}
.pc.sel{border-color:var(--mk);box-shadow:0 0 0 3px var(--mk)}
/* Fantôme drag */
#drag-ghost{
  position:fixed;
  pointer-events:none;
  z-index:9999;
  opacity:0.8;
  display:none;
  transform-origin:top left;
  border:2px solid var(--mk);
  box-shadow:0 4px 16px rgba(0,0,0,0.3);
}
.crow{display:grid;grid-template-columns:1fr 1fr}
.cb{padding:10px 4px;font-size:10px;font-weight:900;letter-spacing:1px;text-transform:uppercase;background:var(--mw);color:var(--mk);border:none;border-right:var(--ls) solid var(--mk);border-bottom:var(--ls) solid var(--mk);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:4px}
.cb:nth-child(even){border-right:none}
.cb:active{filter:brightness(.8)}
.cb-r{border-left:4px solid var(--mr)}
.cb-b{border-left:4px solid var(--mb)}
.cb-y{border-left:4px solid var(--my)}
.cb-k{border-left:4px solid var(--mk)}
#succ{display:none;background:var(--mk);padding:14px;text-align:center}
.sbig2{font-size:13px;font-weight:900;color:var(--mw);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.srow2{display:flex;gap:5px;justify-content:center;margin:6px 0}
.star{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border:var(--ls) solid #333;font-size:14px}
.str{background:var(--mr);border-color:var(--mr)}
.sty{background:var(--my);border-color:var(--my)}
.stb{background:var(--mb);border-color:var(--mb)}
.ssub2{font-size:10px;color:#aaa;letter-spacing:1px;text-transform:uppercase;margin-top:4px}
.snxt{display:none;margin-top:10px;padding:9px 20px;font-family:inherit;font-size:10px;font-weight:900;letter-spacing:2px;text-transform:uppercase;background:var(--my);color:var(--mk);border:var(--ln) solid var(--mk);cursor:pointer}
.snxt:active{filter:brightness(.9)}

  /* Bannière PWA */
  #install-banner{display:none;align-items:center;justify-content:space-between;
    background:var(--mk);padding:8px 12px;border-bottom:var(--ln) solid var(--mk);gap:8px}
  #install-banner span{font-size:10px;font-weight:900;color:var(--mw);letter-spacing:1px;text-transform:uppercase}
  #install-banner button{padding:6px 14px;font-family:inherit;font-size:10px;font-weight:900;
    letter-spacing:1px;text-transform:uppercase;background:var(--my);color:var(--mk);
    border:none;cursor:pointer;flex-shrink:0}
  #install-banner .close-btn{background:transparent;color:#888;font-size:16px;padding:4px 8px;border:none;cursor:pointer}
</style>
</head>

    </div>
    <button onclick="installApp()">📲 Installer</button>

    <button class="cb cb-k" id="bsol" style="border-left:4px solid var(--my)">💡 Solution</button>
    <button class="cb cb-r" id="brst">⟳ Recommencer</button>
    <button class="cb cb-b" id="bnxt" style="display:none">→ Suivant</button>
  </div>

    <div class="srow2" id="srow2"></div>

const SHAPE_COLORS_EASY=['cur-r','cur-b','cur-y','cur-k','cur-p','cur-g','cur-o'];
const SHAPE_COLORS_HARD=['cur-r','cur-b','cur-y','cur-k','cur-p','cur-g','cur-o'];
const SHAPE_COLORS=SHAPE_COLORS_EASY;

// ═══════════════════════════════════════════════
//  ÉTAT
// ═══════════════════════════════════════════════
let mode='grid',li=0,grd=[],pcs=[],sel=null,mv=0,hn=3,ts=0,ti=null,done=false,us=[],hov=null,sil=null;
let pendingDrag={active:false,pidx:null,startX:0,startY:0,fromGrid:false};

const rot=s=>{const R=s.length,C=s[0].length;return Array.from({length:C},(_,c)=>Array.from({length:R},(_,r)=>s[R-1-r][c]));};
const flp=s=>s.map(r=>[...r].reverse());
const cs=s=>s.map(r=>[...r]);
const cg=g=>g.map(r=>[...r]);
const getLvls=()=>mode==='grid'?GRID_LEVELS:(mode==='hard'?SHAPES_2D_HARD:SHAPES_2D);

// ═══════════════════════════════════════════════
//  MODE SWITCH
// ═══════════════════════════════════════════════
function switchMode(m){
  mode=m;
  document.getElementById('tab-grid').className='mtab'+(m==='grid'?' ar':'');
  document.getElementById('tab-2d').className='mtab'+(m==='2d'?' ab':'');
  document.getElementById('tab-hard').className='mtab'+(m==='hard'?' ak':'');
  document.getElementById('sinfo').style.display=(m==='2d'||m==='hard')?'flex':'none';
  buildBar(); initLvl(0);
}

function buildBar(){
  const el=document.getElementById('lsel'); el.innerHTML='';
  const lvls=getLvls(), cols=mode==='grid'?GRID_COLORS:(mode==='hard'?SHAPE_COLORS_HARD:SHAPE_COLORS_EASY);
  lvls.forEach((lv,i)=>{
    const b=document.createElement('button');
    b.className='lb'+(i===0?' '+cols[0]:'');
    b.textContent=lv.n; b.onclick=()=>initLvl(i);
    el.appendChild(b);
  });
}

// ═══════════════════════════════════════════════
//  INIT NIVEAU
// ═══════════════════════════════════════════════
function initLvl(i){
  li=i; done=false; mv=0; hn=3; ts=0;
  clearInterval(ti); ti=setInterval(()=>{if(!done){ts++;rSt();}},1000);
  document.getElementById('succ').style.display='none';
  document.getElementById('bnxt').style.display='none';
  document.getElementById('snxt').style.display='none';
  us=[]; sel=null; hov=null;
  const lv=getLvls()[i];
  const cols=mode==='grid'?GRID_COLORS:(mode==='hard'?SHAPE_COLORS_HARD:SHAPE_COLORS_EASY);
  // Met à jour la barre — scrolle vers le bouton actif
  document.querySelectorAll('.lb').forEach((b,j)=>{b.className='lb'+(j===i?' '+cols[j%cols.length]:'');});
  const activeBtn=document.querySelectorAll('.lb')[i];
  if(activeBtn) activeBtn.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});

  const cv=document.getElementById('grid');
  const avail=Math.min(document.getElementById('gwrap').clientWidth-20,390);

  if(mode==='2d'||mode==='hard'){
    sil=lv.silhouette;
    document.getElementById('sbadge').textContent=lv.emoji;
    document.getElementById('sname').textContent=lv.label;
    document.getElementById('dnum').textContent=`Défi ${i+1} / ${getLvls().length}${mode==='hard'?' ★':''}`;
    const rows=sil.length, ncols=sil[0].length;
    grd=Array.from({length:rows},()=>Array(ncols).fill(null));
    pcs=lv.pieces.map(p=>({...p,shape:cs(p.shape),placed:false,pa:null}));
    const cz=Math.min(44,Math.floor(avail/Math.max(rows,ncols)));
    cv._cz=cz; cv.width=ncols*cz; cv.height=rows*cz;
  } else {
    sil=null;
    const rows=lv.rows, ncols=lv.cols;
    grd=Array.from({length:rows},()=>Array(ncols).fill(null));
    pcs=lv.pieces.map(p=>({...p,shape:cs(p.shape),placed:false,pa:null}));
    const cz=Math.min(44,Math.floor(avail/ncols));
    cv._cz=cz; cv.width=ncols*cz; cv.height=rows*cz;
  }
  rG(); rT(); rSt(); setMsg('Sélectionne une pièce');
}

// ═══════════════════════════════════════════════
//  RENDU
// ═══════════════════════════════════════════════
function rG(){
  const cv=document.getElementById('grid'),ctx=cv.getContext('2d'),CZ=cv._cz||40;
  const rows=grd.length,ncols=grd[0].length;
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.fillStyle='#F5F2E8'; ctx.fillRect(0,0,cv.width,cv.height);
  if(sil){
    for(let r=0;r<rows;r++) for(let c=0;c<ncols;c++) if(sil[r][c]===1){
      ctx.fillStyle='#DDD9C4'; ctx.fillRect(c*CZ,r*CZ,CZ,CZ);
      ctx.strokeStyle='#B8B4A0'; ctx.lineWidth=0.5; ctx.strokeRect(c*CZ,r*CZ,CZ,CZ);
    }
  }
  for(let r=0;r<rows;r++) for(let c=0;c<ncols;c++) if(grd[r][c]){
    const pi=gpa(c,r),isSel=pi!==null&&sel===pi;
    ctx.fillStyle=isSel?ltn(grd[r][c],0.35):grd[r][c];
    ctx.fillRect(c*CZ+1,r*CZ+1,CZ-2,CZ-2);
    if(isSel){ctx.strokeStyle='rgba(255,255,255,0.85)';ctx.lineWidth=2;ctx.strokeRect(c*CZ+3,r*CZ+3,CZ-6,CZ-6);}
  }
  for(let r=0;r<rows;r++) for(let c=0;c<ncols;c++){
    if(!sil||sil[r][c]===1){ctx.strokeStyle='#111';ctx.lineWidth=2;ctx.strokeRect(c*CZ,r*CZ,CZ,CZ);}
  }
  if(sel!==null&&!pcs[sel].placed&&hov){
    const p=pcs[sel],ok=canP(sel,hov.c,hov.r);
    ctx.globalAlpha=0.5;
    for(let r=0;r<p.shape.length;r++) for(let c=0;c<p.shape[r].length;c++) if(p.shape[r][c]){
      const gx=hov.c+c,gy=hov.r+r;
      if(gx>=0&&gx<ncols&&gy>=0&&gy<rows){ctx.fillStyle=ok?p.color:'#D92B1A';ctx.fillRect(gx*CZ+1,gy*CZ+1,CZ-2,CZ-2);}
    }
    ctx.globalAlpha=1;
  }
}
function ltn(hex,a){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return '#'+[r,g,b].map(v=>Math.min(255,Math.round(v+(255-v)*a)).toString(16).padStart(2,'0')).join('');
}
function gpa(col,row){
  const clr=grd[row][col]; if(!clr)return null;
  for(let i=0;i<pcs.length;i++){
    if(pcs[i].placed&&pcs[i].color===clr&&pcs[i].pa){
      const pa=pcs[i].pa,s=pcs[i].shape;
      for(let r=0;r<s.length;r++) for(let c=0;c<s[r].length;c++)
        if(s[r][c]&&pa.r+r===row&&pa.c+c===col)return i;
    }
  }
  return null;
}

// ═══════════════════════════════════════════════
//  BAC
// ═══════════════════════════════════════════════
function rT(){
  const row=document.getElementById('prow'); row.innerHTML=''; let cnt=0;
  pcs.forEach((p,i)=>{
    if(p.placed)return; cnt++;
    const wr=document.createElement('div');
    wr.className='pc'+(sel===i?' sel':'');
    wr.dataset.pidx=i;
    const W=p.shape[0].length,H=p.shape.length,SZ=22;
    const cv2=document.createElement('canvas');
    cv2.width=W*SZ; cv2.height=H*SZ;
    const ctx=cv2.getContext('2d');
    for(let r=0;r<H;r++) for(let c=0;c<W;c++) if(p.shape[r][c]){
      ctx.fillStyle=p.color; ctx.fillRect(c*SZ+1,r*SZ+1,SZ-2,SZ-2);
      ctx.strokeStyle='#111'; ctx.lineWidth=1.5; ctx.strokeRect(c*SZ+1,r*SZ+1,SZ-2,SZ-2);
    }
    wr.appendChild(cv2);

    // ── Tap = sélection, Drag = déplacement ────────────────────────
    wr.addEventListener('pointerdown', e=>{
      e.preventDefault();
      try{ wr.releasePointerCapture(e.pointerId); }catch(err){}
      // Enregistrer le départ — on décide tap vs drag au mouvement/release
      pendingDrag.active = true;
      pendingDrag.pidx   = i;
      pendingDrag.startX = e.clientX;
      pendingDrag.startY = e.clientY;
      pendingDrag.fromGrid = false;
    });

    row.appendChild(wr);
  });
  if(!cnt&&!done){
    const sp=document.createElement('span');
    sp.style.cssText='font-size:10px;font-weight:900;color:#666;letter-spacing:1px;text-transform:uppercase;text-align:center';
    sp.textContent='Clique une pièce sur la grille pour la reprendre';
    row.appendChild(sp);
  }
}

// ══════════════════════════════════════════════════════════════
//  LOGIQUE DE JEU — canP, plc, svu, chkW
// ══════════════════════════════════════════════════════════════

function canP(pi, col, row){
  const rows=grd.length, ncols=grd[0].length, p=pcs[pi];
  for(let r=0;r<p.shape.length;r++) for(let c=0;c<p.shape[r].length;c++){
    if(!p.shape[r][c]) continue;
    const gr=row+r, gc=col+c;
    if(gr<0||gr>=rows||gc<0||gc>=ncols||grd[gr][gc]) return false;
    if(sil && sil[gr][gc]!==1) return false;
  }
  return true;
}

function svu(){
  us.push({
    grid: grd.map(r=>[...r]),
    ps: pcs.map(p=>({placed:p.placed, pa:p.pa?{...p.pa}:null, shape:p.shape.map(r=>[...r])}))
  });
}

function plc(pi, col, row){
  if(!canP(pi, col, row)){
    setMsg('Impossible — tourne ou retourne');
    document.getElementById('grid').animate(
      [{transform:'translateX(-4px)'},{transform:'translateX(4px)'},{transform:'translateX(0)'}],
      {duration:200}
    );
    sel=null; rG(); rT();
    return;
  }
  svu();
  const p=pcs[pi];
  for(let r=0;r<p.shape.length;r++)
    for(let c=0;c<p.shape[r].length;c++)
      if(p.shape[r][c]) grd[row+r][col+c]=p.color;
  pcs[pi].placed=true; pcs[pi].pa={c:col, r:row};
  mv++; sel=null;
  rG(); rT(); rSt();
  setMsg('Posée — glisse-la à nouveau pour la déplacer');
  chkW();
}

function rem(pi){
  svu();
  const p=pcs[pi];
  if(p.pa){
    const pa=p.pa, s=p.shape;
    for(let r=0;r<s.length;r++)
      for(let c=0;c<s[r].length;c++)
        if(s[r][c]) grd[pa.r+r][pa.c+c]=null;
  }
  pcs[pi].placed=false; pcs[pi].pa=null;
  sel=pi; mv++;
  rG(); rT(); rSt();
  setMsg('Pièce reprise');
}

function chkW(){
  const rows=grd.length, ncols=grd[0].length;
  for(let r=0;r<rows;r++)
    for(let c=0;c<ncols;c++)
      if((!sil||sil[r][c]===1) && !grd[r][c]) return;
  done=true; clearInterval(ti);
  const st=hn>=3?3:(hn>=2?2:(hn>=1?1:0));
  const SC=['str','sty','stb'];
  const sr=document.getElementById('srow2'); sr.innerHTML='';
  for(let i=0;i<3;i++){
    const d=document.createElement('div');
    d.className='star '+(i<st?SC[i]:'');
    d.textContent=i<st?'★':'☆';
    d.style.color=i<st?(i===1?'#111':'#fff'):'#555';
    sr.appendChild(d);
  }
  const lv=getLvls()[li];
  document.getElementById('sbigtxt').textContent=
    (mode==='2d'||mode==='hard')?`${lv.label} réussi !`:'Bravo !';
  document.getElementById('ssub2').textContent=
    `${Math.floor(ts/60)}min ${ts%60}s · ${mv} mouvements`;
  document.getElementById('succ').style.display='block';
  if(li<getLvls().length-1) document.getElementById('snxt').style.display='';
  setMsg('');
}


// ══════════════════════════════════════════════════════════════
//  DRAG & DROP — overlay canvas, approche fiable
// ══════════════════════════════════════════════════════════════

// L'état du drag est uniquement basé sur les coordonnées clientX/Y
// stockées à chaque event. Jamais de getBoundingClientRect() au drop.

let drag = {
  active: false,
  pidx:   null,
  fromGrid: false,
  ghostX: 0, ghostY: 0,
  offC: 0, offR: 0,
  dropC: -1, dropR: -1,
};
// pendingDrag déclaré dans les variables globales

// Canvas fantôme : suit le curseur
const ghost = document.getElementById('drag-ghost');

function drawGhost(pidx){
  const p  = pcs[pidx];
  const SZ = cv._cz || 40;
  ghost.width  = p.shape[0].length * SZ;
  ghost.height = p.shape.length    * SZ;
  const ctx = ghost.getContext('2d');
  ctx.clearRect(0, 0, ghost.width, ghost.height);
  for(let r=0; r<p.shape.length; r++)
    for(let c=0; c<p.shape[r].length; c++)
      if(p.shape[r][c]){
        ctx.fillStyle = p.color;
        ctx.fillRect(c*SZ+1, r*SZ+1, SZ-2, SZ-2);
        ctx.strokeStyle = 'rgba(0,0,0,0.55)';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(c*SZ+1, r*SZ+1, SZ-2, SZ-2);
      }
}

// Calcule la case (col, row) sous un point client (x,y)
// Retourne null si hors grille
function ptToCell(clientX, clientY){
  const rect = cv.getBoundingClientRect();
  const CZ   = cv._cz || 40;
  const c = Math.floor((clientX - rect.left) / CZ);
  const r = Math.floor((clientY - rect.top)  / CZ);
  if(r < 0 || r >= grd.length || c < 0 || c >= grd[0].length) return null;
  return {c, r};
}

function startDrag(pidx, clientX, clientY, fromGrid){
  drag.active   = true;
  drag.pidx     = pidx;
  drag.fromGrid = fromGrid;

  const SZ = cv._cz || 40;
  const p  = pcs[pidx];

  // Offset = moitié de la pièce pour centrer sous le curseur
  const offPx = Math.floor(p.shape[0].length / 2) * SZ;
  const offPy = Math.floor(p.shape.length    / 2) * SZ;
  drag.ghostX = clientX - offPx;
  drag.ghostY = clientY - offPy;

  // Quelle case de la pièce est sous le curseur (pour le snapping)
  drag.offC = Math.floor(p.shape[0].length / 2);
  drag.offR = Math.floor(p.shape.length    / 2);

  // Retirer de la grille si fromGrid
  if(fromGrid){
    svu();
    if(p.pa){
      const pa=p.pa, s=p.shape;
      for(let r=0;r<s.length;r++)
        for(let c=0;c<s[r].length;c++)
          if(s[r][c]) grd[pa.r+r][pa.c+c] = null;
    }
    pcs[pidx].placed = false; pcs[pidx].pa = null;
    mv++; rSt();
  }

  sel = pidx;
  drawGhost(pidx);
  ghost.style.left    = drag.ghostX + 'px';
  ghost.style.top     = drag.ghostY + 'px';
  ghost.style.display = 'block';

  // Masquer visuellement dans le bac sans détruire le DOM
  const el = document.querySelector(`.pc[data-pidx="${pidx}"]`);
  if(el) el.style.opacity = '0.15';

  // Calculer la case initiale survolée
  const cell = ptToCell(clientX, clientY);
  drag.dropC = cell ? cell.c - drag.offC : -1;
  drag.dropR = cell ? cell.r - drag.offR : -1;
  hov = cell ? {c: drag.dropC, r: drag.dropR} : null;
  rG();
}

function onDragMove(clientX, clientY){
  if(!drag.active) return;
  const SZ = cv._cz || 40;
  drag.ghostX = clientX - drag.offC * SZ;
  drag.ghostY = clientY - drag.offR * SZ;
  ghost.style.left = drag.ghostX + 'px';
  ghost.style.top  = drag.ghostY + 'px';

  // Snap : calculer la case sous le coin haut-gauche du fantôme
  const rect = cv.getBoundingClientRect();
  const c = Math.floor((drag.ghostX - rect.left) / SZ);
  const r = Math.floor((drag.ghostY - rect.top)  / SZ);
  drag.dropC = c;
  drag.dropR = r;
  hov = {c, r};
  rG();
}

function onDragEnd(clientX, clientY){
  if(!drag.active) return;

  ghost.style.display = 'none';
  drag.active = false;
  hov = null;

  const pidx = drag.pidx;
  drag.pidx  = null;

  // Restaurer opacité dans le bac
  const el = document.querySelector(`.pc[data-pidx="${pidx}"]`);
  if(el) el.style.opacity = '1';

  // Position de drop : coin haut-gauche du fantôme → case grille
  const SZ   = cv._cz || 40;
  const rect = cv.getBoundingClientRect();
  const col  = Math.floor((clientX - drag.offC * SZ - rect.left) / SZ);
  const row  = Math.floor((clientY - drag.offR * SZ - rect.top)  / SZ);

  rG(); // effacer l'aperçu

  if(canP(pidx, col, row)){
    plc(pidx, col, row);
  } else {
    // Essayer la case directement sous le curseur (fallback)
    const cell = ptToCell(clientX, clientY);
    if(cell && canP(pidx, cell.c, cell.r)){
      plc(pidx, cell.c, cell.r);
    } else {
      sel = null; rG(); rT(); setMsg('');
    }
  }
}

// ── Listeners globaux (pointer events) ───────────────────────────────────────
const DRAG_THRESHOLD = 8; // px — distance min pour déclencher le drag

document.addEventListener('pointermove', e => {
  // Déjà en drag → déplacer
  if(drag.active){ onDragMove(e.clientX, e.clientY); return; }
  // Pending : vérifier si on dépasse le seuil
  if(pendingDrag.active){
    const dx = e.clientX - pendingDrag.startX;
    const dy = e.clientY - pendingDrag.startY;
    if(Math.sqrt(dx*dx+dy*dy) > DRAG_THRESHOLD){
      // Seuil dépassé → démarrer le drag
      const pd = pendingDrag;
      pendingDrag = {active:false,pidx:null};
      startDrag(pd.pidx, e.clientX, e.clientY, pd.fromGrid);
    }
  }
});

document.addEventListener('pointerup', e => {
  // Fin drag
  if(drag.active){ onDragEnd(e.clientX, e.clientY); return; }
  // Fin pending sans drag → c'est un TAP = sélection
  if(pendingDrag.active){
    const pd = pendingDrag;
    pendingDrag = {active:false, pidx:null};
    if(!pd.fromGrid){
      // Tap sur pièce du bac → sélectionner/désélectionner
      sel = (sel === pd.pidx) ? null : pd.pidx;
      const el = document.querySelector(`.pc[data-pidx="${pd.pidx}"]`);
      if(el) el.style.opacity = '1';
      rG(); rT();
      setMsg(sel !== null ? 'Tourne / Retourne — puis glisse sur la grille' : '');
    } else {
      // Tap sur pièce de la grille → la sélectionner pour tourner
      sel = pd.pidx;
      rG(); rT();
      setMsg('Pièce sélectionnée — Tourne / Retourne puis re-glisse');
    }
  }
});

document.addEventListener('pointercancel', e => {
  pendingDrag = {active:false, pidx:null};
  if(!drag.active) return;
  ghost.style.display = 'none';
  drag.active = false; drag.pidx = null;
  sel = null; rG(); rT(); setMsg('');
});

// ── Canvas grille — pointerdown sur pièce posée ───────────────────────────────
const cv = document.getElementById('grid');
function pos(cx,cy){
  const CZ=cv._cz||40, rect=cv.getBoundingClientRect();
  return {c:Math.floor((cx-rect.left)/CZ), r:Math.floor((cy-rect.top)/CZ)};
}

cv.addEventListener('pointerdown', e => {
  if(drag.active) return;
  const p = pos(e.clientX, e.clientY);
  if(p.r<0||p.r>=grd.length||p.c<0||p.c>=grd[0].length) return;
  if(grd[p.r] && grd[p.r][p.c]){
    const pi = gpa(p.c, p.r);
    if(pi !== null){
      e.preventDefault();
      try{ cv.releasePointerCapture(e.pointerId); }catch(err){}
      pendingDrag.active   = true;
      pendingDrag.pidx     = pi;
      pendingDrag.startX   = e.clientX;
      pendingDrag.startY   = e.clientY;
      pendingDrag.fromGrid = true;
    }
  }
});


// ═══════════════════════════════════════════════
//  BOUTONS
// ═══════════════════════════════════════════════
function rSt(){
  const m=Math.floor(ts/60),s=ts%60;
  document.getElementById('tv').textContent=m+':'+(s<10?'0':'')+s;
  document.getElementById('mv').textContent=mv; document.getElementById('hv').textContent=hn;
}
function setMsg(t){document.getElementById('msg').textContent=(t||' ').toUpperCase();}

document.getElementById('brot').onclick=()=>{
  if(sel===null){setMsg("Sélectionne une pièce d'abord");return;}
  // Si la pièce est sur la grille, la retirer d'abord
  if(pcs[sel].placed) rem(sel);
  pcs[sel].shape=rot(pcs[sel].shape);rT();rG();setMsg('Tournée — glisse-la sur la grille');
};
document.getElementById('bflp').onclick=()=>{
  if(sel===null){setMsg("Sélectionne une pièce d'abord");return;}
  if(pcs[sel].placed) rem(sel);
  pcs[sel].shape=flp(pcs[sel].shape);rT();rG();setMsg('Retournée — glisse-la sur la grille');
};
document.getElementById('bhnt').onclick=()=>{
  if(hn<=0){setMsg("Plus d'indices !");return;}

  // Chercher la première pièce non placée ET une position valide
  // en testant toutes les orientations possibles
  const rows=grd.length,ncols=grd[0].length;

  function getAllOrientations(shape){
    const variants=new Map();
    const rot=s=>{const R=s.length,C=s[0].length;return Array.from({length:C},(_,c)=>Array.from({length:R},(_,r)=>s[R-1-r][c]));};
    const flp=s=>s.map(r=>[...r].reverse());
    const key=s=>JSON.stringify(s);
    let s=shape;
    for(let f=0;f<2;f++){
      for(let r=0;r<4;r++){
        const k=key(s); if(!variants.has(k)) variants.set(k,s.map(r=>[...r]));
        s=rot(s);
      }
      s=flp(s);
    }
    return Array.from(variants.values());
  }

  for(let pi=0;pi<pcs.length;pi++){
    if(pcs[pi].placed) continue;
    const orientations=getAllOrientations(pcs[pi].shape);
    for(const orient of orientations){
      // Tester cette orientation temporairement
      const origShape=pcs[pi].shape;
      pcs[pi].shape=orient;
      for(let r=0;r<rows;r++){
        for(let c=0;c<ncols;c++){
          if(canP(pi,c,r)){
            // Trouver la position → placer la pièce directement
            hn--;rSt();
            svu(); // sauvegarder pour annulation
            const p=pcs[pi];
            for(let dr=0;dr<p.shape.length;dr++)
              for(let dc=0;dc<p.shape[dr].length;dc++)
                if(p.shape[dr][dc]) grd[r+dr][c+dc]=p.color;
            pcs[pi].placed=true; pcs[pi].pa={c,r};
            sel=null; hov=null;
            rG(); rT(); rSt();
            setMsg('Indice : pièce placée automatiquement');
            chkW();
            return;
          }
        }
      }
      pcs[pi].shape=origShape; // restaurer si pas trouvé
    }
  }
  setMsg('Aucune pièce placeable — recommence le niveau');
};
document.getElementById('bund').onclick=()=>{
  if(!us.length){setMsg('Rien à annuler');return;}
  const s=us.pop();grd=s.grid;
  s.ps.forEach((p,i)=>{pcs[i].placed=p.placed;pcs[i].pa=p.pa;pcs[i].shape=p.shape;});
  mv=Math.max(0,mv-1);sel=null;hov=null;rG();rT();rSt();setMsg('Annulé');
};

document.getElementById('bsol').onclick=()=>{
  const lv=getLvls()[li];
  if(!lv.pieces[0]||lv.pieces[0].solR===undefined){
    setMsg('Solution non disponible pour ce défi');return;
  }
  // Réinitialiser la grille
  const rows=lv.rows||lv.silhouette.length;
  const cols=lv.cols||lv.silhouette[0].length;
  grd=Array.from({length:rows},()=>Array(cols).fill(null));
  pcs.forEach((p,i)=>{p.placed=false;p.pa=null;});
  // Placer chaque pièce à sa position solution
  pcs.forEach((p,i)=>{
    const orig=lv.pieces[i];
    const r=orig.solR, c=orig.solC;
    p.shape=orig.shape.map(row=>[...row]);
    for(let dr=0;dr<p.shape.length;dr++)
      for(let dc=0;dc<p.shape[dr].length;dc++)
        if(p.shape[dr][dc]) grd[r+dr][c+dc]=p.color;
    p.placed=true; p.pa={r,c};
  });
  sel=null; hn=0;
  rG();rT();rSt();
  setMsg('Solution — observe puis recommence !');
};
document.getElementById('brst').onclick=()=>initLvl(li);
const nx=()=>{if(li<getLvls().length-1)initLvl(li+1);};
document.getElementById('bnxt').onclick=nx;
document.getElementById('snxt').onclick=nx;

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
buildBar(); initLvl(0);
</script>
<script>
// ─── PWA : génération icônes + enregistrement Service Worker ───────────────
(function() {
  // Générer une icône Mondrian par canvas
  function makeIcon(size) {
    const cv = document.createElement('canvas');
    cv.width = size; cv.height = size;
    const ctx = cv.getContext('2d');
    const S = size;
    // Fond noir
    ctx.fillStyle = '#111111'; ctx.fillRect(0, 0, S, S);
    // Grille Mondrian
    const lw = Math.max(2, S * 0.025);
    const g = [0, 0.38, 0.62, 1].map(v => Math.round(v * S));
    const gr = [0, 0.35, 0.65, 1].map(v => Math.round(v * S));
    // Rectangles colorés
    const cells = [
      [g[0],gr[0],g[1],gr[2],'#D92B1A'],  // rouge haut-gauche
      [g[1],gr[0],g[2],gr[1],'#F5F2E8'],  // blanc haut-milieu
      [g[2],gr[0],g[3],gr[2],'#1A3A8C'],  // bleu haut-droit
      [g[0],gr[2],g[2],gr[3],'#F5F2E8'],  // blanc bas-gauche
      [g[2],gr[2],g[3],gr[3],'#F5C800'],  // jaune bas-droit
      [g[1],gr[1],g[2],gr[3],'#F5F2E8'],  // blanc centre
    ];
    cells.forEach(([x1,y1,x2,y2,col]) => {
      ctx.fillStyle = col;
      ctx.fillRect(x1+lw, y1+lw, x2-x1-lw*2, y2-y1-lw*2);
    });
    // Lignes noires
    ctx.fillStyle = '#111111';
    [g[1],g[2]].forEach(x => ctx.fillRect(x-lw/2, 0, lw, S));
    [gr[1],gr[2]].forEach(y => ctx.fillRect(0, y-lw/2, S, lw));
    // Lettre P centrale
    const fs = Math.round(S * 0.22);
    ctx.font = `900 ${fs}px Arial Black, Arial`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#F5F2E8';
    ctx.fillText('P', g[1]+(g[2]-g[1])/2, gr[1]+(gr[2]-gr[1])/2);
    return cv.toDataURL('image/png');
  }

  // Injecter icônes
  const icon192 = makeIcon(192);
  const icon512 = makeIcon(512);
  const ati = document.getElementById('apple-touch-icon');
  const fav = document.getElementById('favicon');
  if(ati) ati.href = icon192;
  if(fav) fav.href = icon192;

  // Enregistrer le Service Worker via Blob URL
  if ('serviceWorker' in navigator) {
    const swCode = "\nconst CACHE = 'penta-solo-v1';\nconst ASSETS = ['/'];\n\nself.addEventListener('install', e => {\n  e.waitUntil(\n    caches.open(CACHE).then(c => c.addAll(ASSETS)).then(() => self.skipWaiting())\n  );\n});\n\nself.addEventListener('activate', e => {\n  e.waitUntil(\n    caches.keys().then(keys =>\n      Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))\n    ).then(() => self.clients.claim())\n  );\n});\n\nself.addEventListener('fetch', e => {\n  e.respondWith(\n    caches.match(e.request).then(cached => {\n      if (cached) return cached;\n      return fetch(e.request).then(res => {\n        if (!res || res.status !== 200 || res.type !== 'basic') return res;\n        const clone = res.clone();\n        caches.open(CACHE).then(c => c.put(e.request, clone));\n        return res;\n      }).catch(() => caches.match('/'));\n    })\n  );\n});\n";
    const blob = new Blob([swCode], {type: 'application/javascript'});
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl, {scope: './'})
      .then(reg => {
        console.log('[PWA] SW enregistré :', reg.scope);
        // Mettre en cache la page elle-même
        if ('caches' in window) {
          caches.open('penta-solo-v1').then(c => c.add(location.href));
        }
      })
      .catch(err => console.warn('[PWA] SW échec :', err));
  }

  // Banière installation (beforeinstallprompt)
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    const banner = document.getElementById('install-banner');
    if (banner) banner.style.display = 'flex';
  });
  window.addEventListener('appinstalled', () => {
    const banner = document.getElementById('install-banner');
    if (banner) banner.style.display = 'none';
    deferredPrompt = null;
  });
  window.installApp = function() {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
    }
  };
})();
</script>
